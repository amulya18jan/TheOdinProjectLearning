<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Understanding Lists in HTML</h1>
    <p>There are two main types of lists in HTML:</p>
    <h2>Unordered List</h2>
    <ul>
        <li>Maggi</li>
        <li>Chips</li>
        <li>Popcorn</li>
    </ul>
    <h2>Ordered List</h2>
    <ol>
        <li>Wake up</li>
        <li>Brush teeth</li>
        <li>Have breakfast</li>
    </ol>
</body>
</html>
