<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Cascade</title>
</head>
<body>
    <p class="bolderText">I'm just a paragraph with extra bold text!</p>
    <p class="smallerText">I'm smaller paragraph,also with extra bold text!</p>
    <button class="confirm">Confirm</button>
    <button class="cancel">Cancel</button>
    <div class="thinText">
        I am div with thin text!
        <div class="childDiv">
            I am div with thin text and child div!
        </div>
        <div class="childDiv2">
            I'm smaller child div with extra bold text.
        </div>
    </div>

</body>
</html>
